# Render Blueprint — GGya 오버워치 경매
# 대시보드에서 New + → Blueprint 로 이 저장소를 연결하면 아래 구성이 자동 생성됩니다.
#
# 주의:
# - 초기 데이터는 start 시 `db:init`이 자동 적재합니다. DB가 비어 있을 때만 시드하고,
#   데이터가 있으면 건너뛰므로 재배포/재시작에도 라이브 데이터가 보존됩니다.
#   (파괴적 리셋 `db:seed`는 개발용 — 운영 DB에 직접 쓰지 말 것)
# - 실시간(SSE)·서버 타이머·Discord 봇 때문에 인스턴스는 항상 1개여야 합니다(스케일아웃 금지).

databases:
  - name: ggya-db
    plan: free            # 무료 Postgres는 30일 후 만료 — 실서비스는 유료로
    databaseName: e_sport
    region: singapore     # 한국에서 가장 가까운 리전

services:
  - type: web
    name: ggya
    runtime: node
    plan: free            # 무료는 15분 미사용 시 슬립(콜드스타트 + 봇 재연결) — 행사 땐 유료 권장
    region: singapore
    branch: main          # 배포할 브랜치 (랜딩/경매 변경은 이 브랜치에 머지되어 있어야 함)
    numInstances: 1       # 반드시 1개 (인메모리 상태 공유 불가)
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run db:init && npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ggya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render가 강력한 랜덤 값 자동 생성
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # --- 아래는 대시보드에서 직접 값 입력 (sync:false) ---
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
