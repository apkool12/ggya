# Render Blueprint — GGya 오버워치 경매
# 대시보드에서 New + → Blueprint 로 이 저장소를 연결하면 아래 구성이 자동 생성됩니다.
#
# 주의:
# - 시드(prisma/seed.ts)는 기존 데이터를 전부 지우므로 자동 실행하지 않습니다.
#   최초 1회만 Render Shell에서 `npm run db:seed` 를 직접 실행하세요.
# - 실시간(SSE)·서버 타이머·Discord 봇 때문에 인스턴스는 항상 1개여야 합니다(스케일아웃 금지).

databases:
  - name: ggya-db
    plan: free            # 무료 Postgres는 30일 후 만료 — 실서비스는 유료로
    databaseName: e_sport
    region: singapore     # 한국에서 가장 가까운 리전

services:
  - type: web
    name: ggya
    runtime: node
    plan: free            # 무료는 15분 미사용 시 슬립(콜드스타트 + 봇 재연결) — 행사 땐 유료 권장
    region: singapore
    branch: main          # 배포할 브랜치 (랜딩/경매 변경은 이 브랜치에 머지되어 있어야 함)
    numInstances: 1       # 반드시 1개 (인메모리 상태 공유 불가)
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ggya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render가 강력한 랜덤 값 자동 생성
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # --- 아래는 대시보드에서 직접 값 입력 (sync:false) ---
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
